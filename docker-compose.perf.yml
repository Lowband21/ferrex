version: '3.9'

# Performance overlay for 64GB+ RAM hosts with io_uring kernel support:
# - Enables io_uring + huge pages and larger memory settings for Postgres.
# - Uses environment variable interpolation for large preset defaults.
# - Use only after confirming your host has the RAM/SHM budget and kernel support.
services:
  db:
    security_opt:
      - "seccomp:./seccomp-allow-iouring.json"
    command:
      - "postgres"
      - "-c"
      - "io_method=io_uring"
      - "-c"
      - "max_connections=${FERREX_POSTGRES_MAX_CONNECTIONS:-200}"
      - "-c"
      - "shared_buffers=${FERREX_POSTGRES_SHARED_BUFFERS:-16GB}"
      - "-c"
      - "effective_cache_size=${FERREX_POSTGRES_EFFECTIVE_CACHE_SIZE:-48GB}"
      - "-c"
      - "maintenance_work_mem=${FERREX_POSTGRES_MAINTENANCE_WORK_MEM:-2GB}"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "checkpoint_timeout=30min"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=200"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=${FERREX_POSTGRES_WORK_MEM:-256MB}"
      - "-c"
      - "huge_pages=${FERREX_POSTGRES_HUGE_PAGES:-on}"
      - "-c"
      - "min_wal_size=${FERREX_POSTGRES_MIN_WAL_SIZE:-4GB}"
      - "-c"
      - "max_wal_size=${FERREX_POSTGRES_MAX_WAL_SIZE:-16GB}"
      - "-c"
      - "wal_compression=on"
      - "-c"
      - "max_worker_processes=32"
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "max_parallel_workers=32"
      - "-c"
      - "max_parallel_maintenance_workers=4"
    shm_size: "${FERREX_POSTGRES_SHM_SIZE:-32g}"
