name: Flatpak Build

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - 'flatpak/**'
      - 'ferrex-player/**'
      - 'ferrex-core/**'
      - 'ferrex-model/**'
      - 'ferrex-contracts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main]
    paths:
      - 'flatpak/**'
      - 'ferrex-player/**'
      - 'ferrex-core/**'
      - 'ferrex-model/**'
      - 'ferrex-contracts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch: {}

concurrency:
  group: flatpak-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Flatpak
        uses: flathub-infra/flatpak-github-actions/flatpak-builder@master
        with:
          manifest-path: flatpak/io.github.lowband21.FerrexPlayer.yml
          bundle: ferrex-player.flatpak
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: ferrex-player-flatpak
          path: ferrex-player.flatpak
          retention-days: 7
