name: Release (cargo-dist)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libavdevice-dev \
            libavfilter-dev \
            libswscale-dev \
            libswresample-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config glib gstreamer gst-plugins-base ffmpeg

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dist
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh"

      - name: Build artifacts
        run: dist build --tag="${GITHUB_REF_NAME}" --target=${{ matrix.target }} --output-format=json > dist-manifest.json

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: target/distrib/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist-collect

      - name: Generate manifest and checksums
        shell: bash
        run: |
          set -euo pipefail
          source scripts/release/lib.sh

          mapfile -t artifacts < <(
            find dist-collect -maxdepth 1 -type f \
              -printf '%f\n' | LC_ALL=C sort
          )
          [[ ${#artifacts[@]} -gt 0 ]] || die "no artifacts found in dist-collect"

          tag="${GITHUB_REF_NAME}"
          version="${tag}"
          if [[ "${tag}" == v* ]]; then
            version="${tag#v}"
          fi

          write_manifest \
            "dist-collect/manifest.json" \
            "${tag}" \
            "${version}" \
            "workspace" \
            "${artifacts[@]/#/dist-collect/}"
          write_sha256sums "dist-collect"

      - name: Upload assets to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitDraftDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          artifacts: "dist-collect/**"
          artifactErrorsFailBuild: true
