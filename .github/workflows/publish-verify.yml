name: Publish / Verify Release

on:
  push:
    tags:
      - "v*"
      - "ferrexctl-v*"
  workflow_dispatch: {}

permissions:
  contents: write
  packages: read

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify tag matches version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          echo "tag=$tag"

          workspace_version() {
            awk '
              $0 ~ /^\[workspace\.package\]/ {in_ws=1; next}
              in_ws && $0 ~ /^\[/ {in_ws=0}
              in_ws && $0 ~ /^version[[:space:]]*=/ {
                sub(/^[^"]*"/,""); sub(/".*$/,""); print; exit
              }
            ' Cargo.toml
          }

          ferrexctl_version() {
            awk '
              $0 ~ /^\[package\]/ {in_pkg=1; next}
              in_pkg && $0 ~ /^\[/ {in_pkg=0}
              in_pkg && $0 ~ /^version[[:space:]]*=/ {
                sub(/^[^"]*"/,""); sub(/".*$/,""); print; exit
              }
            ' ferrexctl/Cargo.toml
          }

          if [[ "$tag" == v* ]]; then
            want="${tag#v}"
            have="$(workspace_version)"
            [[ -n "$have" ]] || { echo "error: failed to read workspace version from Cargo.toml" >&2; exit 1; }
            if [[ "$have" != "$want" ]]; then
              echo "error: workspace version mismatch: Cargo.toml=$have tag=$want" >&2
              exit 1
            fi
            echo "ok: workspace version $have matches tag $tag"
          elif [[ "$tag" == ferrexctl-v* ]]; then
            want="${tag#ferrexctl-v}"
            have="$(ferrexctl_version)"
            [[ -n "$have" ]] || { echo "error: failed to read ferrexctl version from ferrexctl/Cargo.toml" >&2; exit 1; }
            if [[ "$have" != "$want" ]]; then
              echo "error: ferrexctl version mismatch: ferrexctl/Cargo.toml=$have tag=$want" >&2
              exit 1
            fi
            echo "ok: ferrexctl version $have matches tag $tag"
          else
            echo "error: unsupported tag format: $tag" >&2
            exit 1
          fi

      - name: Wait for release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          # Wait for manifest.json to appear — its presence means the release
          # job in release.yml has completed and all dist artifacts are uploaded.
          echo "waiting for manifest.json on release $tag (up to 30 min)..."
          for i in $(seq 1 180); do
            if gh release view "$tag" --json assets --jq '.assets[].name' 2>/dev/null | grep -qx 'manifest.json'; then
              echo "found manifest.json after $((i * 10))s"
              break
            fi
            if [[ $i -eq 180 ]]; then
              echo "error: timed out waiting for manifest.json on release $tag" >&2
              exit 1
            fi
            sleep 10
          done

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mkdir -p verify-assets
          gh release download "$tag" --repo "$GITHUB_REPOSITORY" --dir verify-assets
          ls -la verify-assets

      - name: Verify required assets + checksums
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          cd verify-assets

          [[ -f manifest.json ]] || { echo "error: missing manifest.json" >&2; exit 1; }
          [[ -f SHA256SUMS ]] || { echo "error: missing SHA256SUMS" >&2; exit 1; }

          sha256sum -c SHA256SUMS

          python3 - <<'PY'
          import json, os, hashlib, sys

          tag = os.environ["GITHUB_REF_NAME"]
          with open("manifest.json", "r", encoding="utf-8") as f:
              m = json.load(f)

          if m.get("schema") != "ferrex.release-manifest.v1":
              raise SystemExit("error: unexpected manifest schema")

          def sha256(path: str) -> str:
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          names = set()
          for a in m.get("artifacts") or []:
              name = a.get("name")
              if not name:
                  raise SystemExit("error: artifact entry missing name")
              if name in names:
                  raise SystemExit(f"error: duplicate artifact in manifest: {name}")
              names.add(name)
              if not os.path.exists(name):
                  raise SystemExit(f"error: artifact listed in manifest not found: {name}")
              want = a.get("sha256")
              have = sha256(name)
              if want != have:
                  raise SystemExit(f"error: sha256 mismatch for {name}: manifest={want} file={have}")

          # Flatpak artifact is uploaded by a separate workflow and may arrive
          # later.  Warn if absent but do not block the release.
          if tag.startswith("v"):
              ver = tag[1:]
              flatpak = f"ferrex-player_linux_x86_64_{ver}.flatpak"
              if flatpak not in names:
                  print(f"::warning::flatpak artifact not yet present: {flatpak}", file=sys.stderr)

          print("ok: manifest checksums and artifact integrity verified")
          PY

      - name: Verify GHCR image tags exist
        if: ${{ startsWith(github.ref_name, 'v') || startsWith(github.ref_name, 'ferrexctl-v') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          echo "${GH_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin >/dev/null

          if [[ "$tag" == v* ]]; then
            ver="${tag#v}"
            img="ghcr.io/${GITHUB_REPOSITORY_OWNER}/ferrex-server:${ver}"
          elif [[ "$tag" == ferrexctl-v* ]]; then
            ver="${tag#ferrexctl-v}"
            img="ghcr.io/${GITHUB_REPOSITORY_OWNER}/ferrexctl:${ver}"
          else
            echo "no image verification required"
            exit 0
          fi

          echo "checking image: $img"
          for _ in $(seq 1 60); do
            if docker manifest inspect "$img" >/dev/null 2>&1; then
              echo "ok: image exists: $img"
              exit 0
            fi
            echo "waiting for image manifest to appear: $img"
            sleep 10
          done

          echo "error: image not found after waiting: $img" >&2
          exit 1

      - name: Publish draft release (if needed)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${tag}"
          json="$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28" "$api")"

          release_id="$(echo "$json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"
          draft="$(echo "$json" | python3 -c 'import json,sys; print("true" if json.load(sys.stdin).get("draft") else "false")')"

          if [[ "$draft" != "true" ]]; then
            echo "release is already published; nothing to do"
            exit 0
          fi

          echo "publishing draft release id=$release_id for tag=$tag"
          curl -fsSL \
            -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -d '{"draft":false}'
