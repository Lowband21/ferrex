name: Publish to crates.io

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not actually publish)'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libavdevice-dev \
            libavfilter-dev \
            libswscale-dev \
            libswresample-dev

      - name: Verify crate versions match
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "ferrex-model") | .version')
          echo "Publishing version: $VERSION"

      - name: Publish ferrex-model (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        run: cargo publish -p ferrex-model --dry-run

      - name: Publish ferrex-model
        if: ${{ (github.event_name == 'release' && startsWith(github.ref_name, 'v') && !startsWith(github.ref_name, 'ferrexctl-v')) || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false') }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p ferrex-model --no-verify

      - name: Wait for ferrex-model to be available
        if: ${{ (github.event_name == 'release' && startsWith(github.ref_name, 'v') && !startsWith(github.ref_name, 'ferrexctl-v')) || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false') }}
        run: sleep 30

      - name: Publish ferrex-contracts (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        run: cargo publish -p ferrex-contracts --dry-run

      - name: Publish ferrex-contracts
        if: ${{ (github.event_name == 'release' && startsWith(github.ref_name, 'v') && !startsWith(github.ref_name, 'ferrexctl-v')) || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false') }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p ferrex-contracts --no-verify

      - name: Wait for ferrex-contracts to be available
        if: ${{ (github.event_name == 'release' && startsWith(github.ref_name, 'v') && !startsWith(github.ref_name, 'ferrexctl-v')) || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false') }}
        run: sleep 30

      - name: Publish ferrexctl (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        run: cargo publish -p ferrexctl --dry-run

      - name: Publish ferrexctl
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false') }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p ferrexctl --no-verify
