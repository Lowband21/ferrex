version: '3.9'

volumes:
  postgres-data:
  redis-data:

services:
  db:
    image: postgres:18
    container_name: ferrex_media_db
    command:
      - "postgres"
      - "-c"
      - "max_connections=${FERREX_POSTGRES_MAX_CONNECTIONS:-50}"
      - "-c"
      - "shared_buffers=${FERREX_POSTGRES_SHARED_BUFFERS:-512MB}"
      - "-c"
      - "effective_cache_size=${FERREX_POSTGRES_EFFECTIVE_CACHE_SIZE:-2GB}"
      - "-c"
      - "maintenance_work_mem=${FERREX_POSTGRES_MAINTENANCE_WORK_MEM:-256MB}"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "checkpoint_timeout=30min"
      - "-c"
      - "wal_buffers=${FERREX_POSTGRES_WAL_BUFFERS:-16MB}"
      - "-c"
      - "default_statistics_target=500"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=${FERREX_POSTGRES_WORK_MEM:-16MB}"
      - "-c"
      - "huge_pages=${FERREX_POSTGRES_HUGE_PAGES:-try}"
      - "-c"
      - "min_wal_size=${FERREX_POSTGRES_MIN_WAL_SIZE:-1GB}"
      - "-c"
      - "max_wal_size=${FERREX_POSTGRES_MAX_WAL_SIZE:-4GB}"
      - "-c"
      - "wal_compression=on"
      - "-c"
      - "max_worker_processes=8"
      - "-c"
      - "max_parallel_workers_per_gather=2"
      - "-c"
      - "max_parallel_workers=8"
      - "-c"
      - "max_parallel_maintenance_workers=2"
    shm_size: "${FERREX_POSTGRES_SHM_SIZE:-2g}"
    environment:
      DATABASE_ADMIN_USER: ${DATABASE_ADMIN_USER:-postgres}
      DATABASE_ADMIN_PASSWORD: ${DATABASE_ADMIN_PASSWORD}
      POSTGRES_USER: ${DATABASE_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_ADMIN_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME:-ferrex}
      POSTGRES_INITDB_ARGS: "${POSTGRES_INITDB_ARGS:---auth-host=scram-sha-256 --auth-local=scram-sha-256}"
      # App-specific init (consumed by /docker-entrypoint-initdb.d/01-init.sh)
      DATABASE_NAME: ${DATABASE_NAME:-ferrex}
      DATABASE_APP_USER: ${DATABASE_APP_USER:-ferrex_app}
      DATABASE_APP_PASSWORD: ${DATABASE_APP_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      # Postgres 18+ stores data in a major-version-specific subdirectory.
      # Mount the parent dir so upgrades can use pg_upgrade --link cleanly.
      - postgres-data:/var/lib/postgresql
      - ./pgsock:/var/run/postgresql
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$DATABASE_ADMIN_USER\" -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  # Redis for caching
  cache:
    image: redis:8-alpine
    container_name: ferrex_media_cache
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  # Ferrex server (built locally; exposes port 3000)
  ferrex:
    image: ${FERREX_SERVER_IMAGE:-ghcr.io/lowband21/ferrex-server:latest}
    container_name: ferrex_media_server
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    # Load environment for server container
    env_file:
      - ${FERREX_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql://${DATABASE_APP_USER:-ferrex_app}:${DATABASE_APP_PASSWORD}@${DATABASE_HOST_CONTAINER:-db}:${DATABASE_PORT:-5432}/${DATABASE_NAME:-ferrex}
      DATABASE_HOST: ${DATABASE_HOST_CONTAINER:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-ferrex}
      DATABASE_APP_USER: ${DATABASE_APP_USER:-ferrex_app}
      DATABASE_APP_PASSWORD: ${DATABASE_APP_PASSWORD}
      RUST_LOG: ${RUST_LOG:-info}
      REDIS_URL: ${REDIS_URL_CONTAINER:-redis://cache:6379}
      MEDIA_ROOT: /media
      TMDB_API_KEY: ${TMDB_API_KEY}
    ports:
      - "3000:3000"
    volumes:
      - ${CACHE_ROOT:-./cache}:/app/cache:rw
      - ${MEDIA_ROOT:-./media}:/media:ro
      # Optional TLS certs if terminating at app
      # - ./certs:/certs:ro
